<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora Interés Compuesto</title>
  <link rel="stylesheet" href="../css/styles.css">
  <div class="card top-bar">
    <button onclick="window.location.href='../index.html'">🏠 Inicio</button>
    <button onclick="window.location.href='CalculoTIR.html'">📊 TIR</button>
  </div>
</head>
<body>

<div class="container">

  <h1>💰 Interés Compuesto</h1>

  <div class="card">
    <label>Capital inicial</label>
    <input type="number" id="capital">

    <label>Tasa anual (%)</label>
    <input type="number" id="tasa">

    <label>Años</label>
    <input type="number" id="años">

    <label>Aportación mensual</label>
    <input type="number" id="aporte">

    <button onclick="calcularInteres()">Calcular</button>
  </div>

  <div class="card">
    <h3>Resultado</h3>
    <p id="resultado"></p>
  </div>

</div>

<script src="../js/compound.js"></script>

</body>
</html>
