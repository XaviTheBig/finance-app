<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Seguimiento</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="icon" href="../assets/Favicon.ico">
  <style>
    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .sheet-title {
      font-size: 1.4em;
    }

    .sheet-actions {
      display: flex;
      gap: 10px;
    }

    .sheet-container {
      margin-top: 15px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #30363d;
      height: 80vh;
      background: #0d1117;
    }

    .sheet-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .sheet-info {
      font-size: 0.85em;
      color: #8b949e;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<div class="card top-bar">
  <div class="nav-left">
    <span style="font-weight: bold;">📈 EquityLab   </span>
    <button onclick="window.location.href='../index.html'">🏠 Inicio</button>
    <button onclick="window.location.href='CalculoTIR.html'">📊 Análisis TIR</button>
    <button onclick="window.location.href='compound.html'">💰 Interés Compuesto</button>
    <button class="active">📋 Panel de Seguimiento</button>
  </div>
</div>

<div class="container">

  <h1>📊 Dashboard de Seguimiento</h1>

  <div class="card">
    <div class="sheet-header">
      <div>
        <div class="sheet-title">📋 Hoja de seguimiento de Empresas Pilares</div>
        <div class="sheet-info">Datos sincronizados desde Google Sheets de IDC</div>
      </div>
    </div>
  </div>

  <div class="sheet-container">
    <iframe id="sheetFrame"
      src="https://docs.google.com/spreadsheets/d/e/2PACX-1vScqyo18vkcYw84lNcfl3dxwp8iAT3ztqkrLL_d37YMGaFLprtGzEXhLgsj0g6baN05HLanOwJhaTJ-/pubhtml/sheet?headers=false&gid=668411078">
    </iframe>
  </div>

</div>

<script>
  function recargarSheet() {
    const iframe = document.getElementById("sheetFrame");
    iframe.src = iframe.src;
  }
</script>

</body>
</html>
